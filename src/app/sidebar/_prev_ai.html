<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./client/styles/control-panel.css" />
  <link rel="stylesheet" href="./client/app/side/styles/side.css" />
</head>
<body>
  <div class="control-shell">
    <nav class="tab-nav" aria-label="侧边栏栏目">
      <button class="tab-button active" type="button"><span class="tab-button-icon">✦</span><span>AI 控制</span></button>
      <button class="tab-button" type="button"><span class="tab-button-icon">●</span><span>个人中心</span></button>
      <button class="tab-button" type="button"><span class="tab-button-icon">⚙</span><span>AI-FREE 参数</span></button>
    </nav>
    <div class="main-wrapper">
      <section class="ai-control-panel panel active">
        <header class="ai-chat-header">
          <div class="ai-chat-model-row">
            <label>模型</label>
            <select><option>GPT-4o</option></select>
            <button>↻</button>
          </div>
          <button class="ai-chat-clear" type="button">新对话</button>
        </header>
        <div class="ai-chat-quota">今日剩余 32 次</div>
        <div class="ai-chat-messages">
          <div class="ai-chat-message user"><div class="ai-chat-bubble">帮我把这段话改得更正式一点</div></div>
          <div class="ai-chat-message assistant"><div class="ai-chat-bubble">当然可以。以下是更正式的版本：……</div></div>
          <div class="ai-chat-message user"><div class="ai-chat-bubble">谢谢</div></div>
        </div>
        <form class="ai-chat-composer"><textarea rows="1" placeholder="输入消息，Enter 发送，Shift + Enter 换行"></textarea><button type="submit">↑</button></form>
      </section>
    </div>
  </div>
</body>
</html>
