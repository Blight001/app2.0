<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http: https:; object-src 'none'; base-uri 'self'">
  <meta name="theme-color" content="#050807" />
  <title>卡密搜索</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #050807;
      overflow: hidden;
    }
  </style>
  <link rel="stylesheet" href="../renderer/styles/license.css" />
</head>
<body>
  <div class="license-bg" aria-hidden="true">
    <span class="aurora aurora-a"></span>
    <span class="aurora aurora-b"></span>
    <span class="pulse"></span>
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
    <span class="grid"></span>
  </div>

  <div class="license-wrap">
    <div class="license-card">
      <div class="hero-badge">Card Search</div>
      <div class="license-title">无限AI生成-卡密认证</div>

      <div class="form-group">
        <label for="license-key">卡密</label>
        <div class="input-shell">
          <input id="license-key" type="text" placeholder="请输入您的卡密" maxlength="30" autocomplete="off" />
          <button id="license-submit" class="primary-btn" type="button" data-loading-text="搜索中...">搜索并进入</button>
          <div id="license-suggest" class="suggest-panel hidden" aria-label="历史记录建议"></div>
        </div>
      </div>

      <div id="license-status" class="status-text"></div>
    </div>
  </div>

  <div id="license-delete-modal" class="delete-modal hidden" aria-hidden="true">
    <div class="delete-modal-backdrop" data-action="close"></div>
    <div class="delete-modal-card" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
      <div class="delete-modal-title" id="delete-modal-title">删除历史卡密</div>
      <div class="delete-modal-text" id="delete-modal-text">确定删除这条卡密记录吗？</div>
      <div class="delete-modal-actions">
        <button id="delete-modal-cancel" type="button" class="delete-modal-btn secondary">取消</button>
        <button id="delete-modal-confirm" type="button" class="delete-modal-btn danger">删除</button>
      </div>
    </div>
  </div>

  <script src="../renderer/controllers/shared/controller-utils.js"></script>
  <script src="../renderer/controllers/pages/license/index.js"></script>
</body>
</html>
