<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http: https:; object-src 'none'; base-uri 'self'">
  <title>AI-FREE</title>
  <link rel="stylesheet" href="../renderer/styles/app-shell.css" />
</head>
<body>
  <div id="app-container">
    <div id="tab-bar">
      <div class="tabs" id="tabs-container">
        <!-- Tabs will be dynamically inserted here -->
        <button id="new-browser-window-btn" type="button" title="新建浏览器窗口" aria-label="新建浏览器窗口">
          <svg class="new-window-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 6.75v10.5M6.75 12h10.5"></path>
          </svg>
        </button>
      </div>
      <div id="update-widget" class="shell-update-widget" role="status" aria-live="polite" aria-label="软件更新进度" title="准备更新" hidden>
        <div id="update-widget-ring" class="shell-update-ring" style="--update-progress: 0%;" aria-hidden="true">
          <span class="shell-update-ring-fill"></span>
          <span id="update-widget-percent" class="shell-update-percent">0%</span>
        </div>
      </div>
      <button id="theme-toggle-btn" class="shell-theme-toggle-btn" type="button" aria-pressed="false" aria-label="切换主题" title="切换到白色模式">
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4.2"></circle>
          <path d="M12 1.8v3.1M12 19.1v3.1M4.6 4.6l2.2 2.2M17.2 17.2l2.2 2.2M1.8 12h3.1M19.1 12h3.1M4.6 19.4l2.2-2.2M17.2 6.8l2.2-2.2"></path>
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.4 14.2A8.5 8.5 0 0 1 9.8 3.6a9 9 0 1 0 10.6 10.6Z"></path>
          <path d="M18.8 5.2l.5 1.4 1.4.5-1.4.5-.5 1.4-.5-1.4-1.4-.5 1.4-.5.5-1.4Z"></path>
        </svg>
      </button>
      <button id="account-center-btn" type="button" title="个人中心（未登录）" aria-label="打开个人中心（未登录）" aria-haspopup="dialog">
        <img data-app-logo alt="">
        <span class="account-center-status" aria-hidden="true"></span>
      </button>
      <div id="add-tab-btn" title="单击切换侧栏，双击打开网页控制台" role="button" aria-label="切换侧栏">
        <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 8.25A3.75 3.75 0 1 0 12 15.75 3.75 3.75 0 0 0 12 8.25Z"></path>
          <path d="M19.1 13.1c.05-.36.08-.72.08-1.1s-.03-.74-.08-1.1l2-1.56-1.9-3.28-2.35.95a8.4 8.4 0 0 0-1.9-1.1L14.6 3.4h-3.8l-.36 2.51a8.4 8.4 0 0 0-1.9 1.1L6.2 6.06 4.3 9.34l2 1.56c-.05.36-.08.72-.08 1.1s.03.74.08 1.1l-2 1.56 1.9 3.28 2.35-.95a8.4 8.4 0 0 0 1.9 1.1l.36 2.51h3.8l.36-2.51a8.4 8.4 0 0 0 1.9-1.1l2.35.95 1.9-3.28-2-1.56Z"></path>
        </svg>
      </div>
    </div>
    <div id="content-area"></div>
  </div>
  <script src="../sidebar/client/scripts/logo-assets.js"></script>
  <script src="../renderer/controllers/shared/controller-utils.js"></script>
  <script src="../renderer/controllers/pages/app-shell/tabs.js"></script>
</body>
</html>
