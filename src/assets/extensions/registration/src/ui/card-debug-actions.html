<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片调试</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #d9e2ec;
            --text: #172033;
            --button-bg: #f1f5f9;
            --button-hover: #e2e8f0;
            --button-active: #dbeafe;
            --button-border: #cbd5e1;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --surface: #1f2937;
                --border: #374151;
                --text: #f9fafb;
                --button-bg: #273449;
                --button-hover: #334155;
                --button-active: #1e3a5f;
                --button-border: #4b5563;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
        }

        .debug-actions {
            width: min(430px, calc(100vw - 32px));
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        button {
            height: 42px;
            border: 1px solid var(--button-border);
            border-radius: 6px;
            background: var(--button-bg);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: default;
        }

        button:hover {
            background: var(--button-hover);
        }

        button:active {
            background: var(--button-active);
        }

        .status {
            min-height: 20px;
            font-size: 12px;
            line-height: 1.5;
            color: #64748b;
            word-break: break-all;
        }

        .status.error {
            color: #dc2626;
        }

        .status.success {
            color: #198754;
        }
    </style>
</head>
<body>
    <main class="debug-actions" aria-label="卡片调试动作">
        <button id="get-random-email-btn" type="button">获取随机邮箱</button>
        <button type="button">输入随机邮箱</button>
        <button type="button">输入验证码</button>
        <div id="debug-action-status" class="status" aria-live="polite"></div>
    </main>
    <script>
        (() => {
            const getRandomEmailBtn = document.getElementById('get-random-email-btn');
            const status = document.getElementById('debug-action-status');

            const setStatus = (text, type = '') => {
                status.textContent = text || '';
                status.classList.remove('success', 'error');
                if (type) {
                    status.classList.add(type);
                }
            };

            getRandomEmailBtn.addEventListener('click', async () => {
                if (!window.cardDebugActions || typeof window.cardDebugActions.getRandomEmail !== 'function') {
                    setStatus('调试动作接口不可用', 'error');
                    return;
                }

                getRandomEmailBtn.disabled = true;
                setStatus('正在获取随机邮箱...');
                try {
                    const result = await window.cardDebugActions.getRandomEmail();
                    if (!result || result.success !== true) {
                        throw new Error(result?.error || '获取随机邮箱失败');
                    }
                    setStatus(`已获取: ${result.email}`, 'success');
                } catch (error) {
                    setStatus(error.message || '获取随机邮箱失败', 'error');
                } finally {
                    getRandomEmailBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
