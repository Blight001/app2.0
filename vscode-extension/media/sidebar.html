<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} data: http: https:; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{cssUri}}">
  <title>AI Free Tools</title>
</head>
<body class="vscode-extension-sidebar">
  <div id="side-panel" class="side-panel panel active">
    <div class="container">
      <div class="info-group">
        <div class="form-group device-id-row">
          <label for="device-id">设备号:</label>
          <input type="text" id="device-id" value="" readonly>
        </div>
        <div class="form-group key-row">
          <label for="key-input">卡密:</label>
          <div class="key-input-shell">
            <input type="text" id="key-input" value="" placeholder="请输入您的卡密" maxlength="30">
            <button id="validate-key-btn" class="btn-blue">验证</button>
          </div>
        </div>
        <div class="info-line license-summary-line">
          <div class="license-summary-item">
            <span>有效期: </span>
            <span id="expire-time">未验证</span>
          </div>
          <div class="license-summary-item">
            <span>剩余: </span>
            <span id="usage-times">未验证</span>
          </div>
        </div>
      </div>

      <div class="account-launch-row">
        <button id="open-dream-page-btn" class="main-button btn-large-blue requires-license" disabled>一键启动 即梦AI (可多开)</button>
        <div class="account-history-shell">
          <button id="account-history-toggle-btn" class="main-button btn-large-blue requires-license" disabled type="button">历史记录</button>
          <div id="account-panel" class="account-popup-panel" hidden>
            <div class="info-group account-popup-panel-body">
              <div class="account-list" id="account-list">
                <div class="account-empty" id="account-empty">暂无保存的账号</div>
              </div>
              <div id="cookie-import-section" class="cookie-import-section" hidden>
                <button id="cookie-import-btn" class="main-button btn-large-teal cookie-import-btn" type="button" data-loading-text="导入中...">导入账号</button>
                <button id="open-registration-web-btn" class="main-button btn-large-purple registration-web-btn" type="button" hidden>打开注册器</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="launch-shortcuts-row">
        <button id="open-opencut-page-btn" class="main-button btn-large-green requires-license" data-loading-text="打开中..." disabled>视频剪辑</button>
        <button id="open-ai-canvas-pro-page-btn" class="main-button btn-large-green requires-license" data-loading-text="打开中..." disabled>无限画布</button>
        <button id="open-toonflow-page-btn" class="main-button btn-large-green requires-license" data-loading-text="打开中..." disabled>自动分镜</button>
      </div>

      <div class="vpn-buttons-container">
        <button id="VPN-switch" class="main-button btn-large-purple VPN-btn" disabled>开启网络魔法</button>
      </div>

      <div class="vpn-node-selector-shell">
        <div class="vpn-node-selector-row">
          <button id="test-min-latency-btn" class="main-button btn-large-purple VPN-btn vpn-node-selector-btn vpn-node-selector-btn-primary" disabled>
            <span class="vpn-node-selector-btn-main">
              <span class="vpn-node-selector-label">选择最佳路线</span>
            </span>
          </button>
          <button id="vpn-node-selector-toggle-btn" class="main-button btn-large-purple vpn-node-selector-btn vpn-node-selector-btn-toggle" disabled aria-expanded="false" type="button">
            <span class="vpn-node-selector-toggle-text">选择路线</span>
          </button>
        </div>
        <div id="vpn-node-selector-panel" class="vpn-node-selector-panel" hidden>
          <div class="vpn-node-selector-panel-head">
            <span class="vpn-node-selector-panel-title">切换节点</span>
            <span id="vpn-node-selector-group" class="vpn-node-selector-panel-subtitle">节点选择</span>
          </div>
          <div id="vpn-node-selector-grid" class="vpn-node-selector-grid"></div>
        </div>
      </div>

      <details class="vscode-config-panel">
        <summary>导入 Clash 配置</summary>
        <textarea id="clash-config-input" spellcheck="false" placeholder="粘贴 Clash YAML 配置，包含 proxies / proxy-groups / rules 等字段"></textarea>
        <button id="save-clash-config-btn" class="main-button btn-large-teal" type="button">保存配置</button>
      </details>

      <button id="start-clash-mini-btn" class="main-button btn-large-teal" data-loading-text="启动中..." hidden>启动 Clash Mini</button>

      <div class="plugin-switch-group" aria-label="浏览器插件开关">
        <div class="plugin-switch-row">
          <span class="plugin-switch-label">去水印插件  (右键视频图片直接下载)</span>
          <label class="plugin-switch" title="VS Code 插件模式暂不支持浏览器扩展注入">
            <input type="checkbox" id="remove-watermark-switch" aria-disabled="true" />
            <span class="plugin-switch-slider"></span>
          </label>
        </div>
        <div class="plugin-switch-row">
          <span class="plugin-switch-label">翻译插件  (点击网页右侧粉色按钮翻译)</span>
          <label class="plugin-switch" title="VS Code 插件模式暂不支持浏览器扩展注入">
            <input type="checkbox" id="translate-ext-switch" aria-disabled="true" />
            <span class="plugin-switch-slider"></span>
          </label>
        </div>
      </div>

      <div class="announcement-bar" id="announcement-bar">
        <div class="announcement-header">
          <div class="announcement-title-wrap">
            <span id="announcement-icon" class="announcement-icon">VS</span>
            <span id="announcement-title" class="announcement-title">VS Code 插件模式</span>
          </div>
          <div class="announcement-header-actions">
            <button id="theme-toggle-btn" class="theme-toggle-btn" type="button" aria-pressed="false" aria-label="切换主题" title="切换到浅色模式">☀</button>
          </div>
        </div>
        <div class="announcement-content" id="announcement-content">
          <p>侧边栏、启动入口和网络魔法已迁移。自动更新、Electron 多标签和浏览器扩展注入未迁移。</p>
        </div>
      </div>

      <div class="footer">
        <div class="footer-left">
          <a id="tutorial-link" href="#" target="_blank" rel="noopener noreferrer">使用教程</a>
        </div>
        <div class="footer-center">
          <span id="connection-status" class="status-indicator status-connecting"><span class="status-dot"></span>初始化中...</span>
        </div>
        <div class="footer-right">
          <span id="app-version">v0.1.0</span>
        </div>
      </div>

      <details id="debug-console" class="debug-console" open>
        <summary>
          <span>调试控制台</span>
          <button id="debug-console-clear-btn" type="button">清空</button>
        </summary>
        <div id="debug-console-lines" class="debug-console-lines" aria-live="polite"></div>
      </details>
    </div>
  </div>
  <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
